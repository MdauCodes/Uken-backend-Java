spring:
  application:
    name: ukena-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ukena}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      pool-name: UkenaHikariPool
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true
        format_sql: false
        use_sql_comments: false
        generate_statistics: false
        cache:
          use_second_level_cache: false

  freemarker:
    template-loader-path: classpath:/templates/email/
    default-encoding: UTF-8
    cache: false
    prefer-file-system-access: false

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 24MB

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  http2:
    enabled: true
  shutdown: graceful
  error:
    include-stacktrace: never
    include-exception: false
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

ukena:
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: 24

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://ukena.co.uk}

  media:
    provider: ${MEDIA_PROVIDER:cloudinary}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

  admin:
    email: ${UKENA_ADMIN_EMAIL:admin@ukena.co.uk}
    password: ${UKENA_ADMIN_PASSWORD:}

  email:
    from-address: ${EMAIL_FROM:mdaucodes@gmail.com}
    from-name: ${EMAIL_FROM_NAME:Ukena}
    brevo-api-key: ${BREVO_API_KEY}
    brevo-api-url: https://api.brevo.com/v3/smtp/email
    frontend-url: ${FRONTEND_URL:http://localhost:5173}

  payment:
    provider: ${PAYMENT_PROVIDER:pesapal}
    commission-rate: 0.15

  pesapal:
    consumer-key: ${PESAPAL_CONSUMER_KEY:}
    consumer-secret: ${PESAPAL_CONSUMER_SECRET:}
    base-url: ${PESAPAL_BASE_URL:https://cybqa.pesapal.com/pesapalv3}
    ipn-url: ${BACKEND_URL:http://localhost:8080}/api/payments/webhook
    redirect-url: ${FRONTEND_URL:http://localhost:5173}/checkout/confirmation
    currency: GBP

  flutterwave:
    secret-key: ${FLUTTERWAVE_SECRET_KEY:}
    public-key: ${FLUTTERWAVE_PUBLIC_KEY:}
    webhook-secret: ${FLUTTERWAVE_WEBHOOK_SECRET:}
    base-url: https://api.flutterwave.com/v3
    redirect-url: ${FRONTEND_URL:http://localhost:5173}/checkout/confirmation
    currency: GBP

  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
    enabled: ${TWILIO_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}

logging:
  level:
    root: WARN
    com.mdau.ukena: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

resilience4j:
  ratelimiter:
    instances:
      public-api:
        limit-for-period: 60
        limit-refresh-period: 1m
        timeout-duration: 0s
      auth-api:
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 0s
      upload-api:
        limit-for-period: 20
        limit-refresh-period: 1m
        timeout-duration: 0s